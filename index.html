  <body>
	<h1 align="center">PMC Services</h1>
		<hr color="black">
        <h2 align="center">Property Tax Due Details</h2>
        <div class="form1">
            <form method="get" align="center">
			Property Type* : 
            <select>
                <option>--Select-</option>
                <option>P</option>
                <option>O</option>
                <option>F</option>
            </select><br><br>
            Section ID* : <input type="select" height="20px" width="60px" required><br><br>
            Peth ID* : <input type="select" height="20px" width="60px" required><br><br>
            Account No* : <input type="select" height="20px" width="60px" required><br><br>
            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </div>
<br>
<hr color="black">
        <h2 align="center">Property Owner Details</h2><br>
        <form method="get" align="center">
            Name : <input type="text" placeholder="Enter Your Name"><br><br>
            Ward : <input type="number" placeholder="eg. A21"><br><br>
            Address : <input type="textbox"><br><br>
            <hr color="black"> 
        </form>
		</form>
